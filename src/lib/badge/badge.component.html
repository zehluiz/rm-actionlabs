<span class="ds-badge" [attr.data-color]="color">
  <span
    *ngIf="element === 'bullet'"
    class="ds-badge__bullet"
    aria-hidden="true"
  ></span>

  <i
    *ngIf="element === 'icon' && icon"
    class="ds-badge__icon"
    [ngClass]="icon"
    aria-hidden="true"
  ></i>

  <span class="ds-badge__label">{{ label }}</span>
</span>
