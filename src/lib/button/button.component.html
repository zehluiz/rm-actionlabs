<button
  class="ds-button"
  [attr.data-type]="type"
  [attr.data-size]="size"
  [disabled]="disabled"
  [type]="htmlType"
>
  <i *ngIf="iconBefore" class="ds-button__icon" [ngClass]="iconBefore" aria-hidden="true"></i>
  <span class="ds-button__label">{{ label }}</span>
  <i *ngIf="iconAfter" class="ds-button__icon" [ngClass]="iconAfter" aria-hidden="true"></i>
</button>
